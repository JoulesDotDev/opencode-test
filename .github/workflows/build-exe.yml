name: build-exe

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-exe:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OPENCODE_CHANNEL: prod
      OPENCODE_UPDATE_BASE_URL: http://opencode.pfcicd.local.programmierfabrik.at/opencode
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare desktop build
        working-directory: packages/desktop-electron
        run: bun ./scripts/prepare.ts

      - name: Package Windows EXE
        working-directory: packages/desktop-electron
        run: bun run package:win -- --publish never

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencode-windows-exe
          path: |
            packages/desktop-electron/dist/*.exe
            packages/desktop-electron/dist/latest*.yml
            packages/desktop-electron/dist/*.blockmap
